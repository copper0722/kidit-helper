name: test

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  static-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: git diff --exit-code -- docs dist
