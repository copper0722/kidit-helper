<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KiDit 小幫手 v__VERSION__ 測試頁</title>
  <style>
    body { max-width: 760px; margin: 32px auto; padding: 0 20px; color: #17202a; font: 16px/1.6 Arial, sans-serif; }
    label { display: block; margin-top: 18px; font-weight: 700; }
    select { min-width: 280px; min-height: 42px; padding: 6px; font-size: 16px; }
    .install { display: inline-block; min-height: 44px; margin-bottom: 20px; padding: 9px 14px; border-radius: 7px; background: #0e7490; color: #fff; font-weight: 700; text-decoration: none; }
    #eventLog { margin-top: 24px; padding: 12px; background: #f1f5f9; }
  </style>
</head>
<body>
  <h1>KiDit 小幫手 v__VERSION__ 測試頁</h1>
  <p>點下面按鈕模擬書籤執行；本頁不含真實病人資料。</p>
  <a class="install" id="runBookmarklet" href="__BOOKMARKLET_HREF__">啟用 KiDit 小幫手</a>

  <form action="/Patient/SaveDeleteCancel" method="post">
    <label for="COUNTY">縣市</label>
    <select id="COUNTY" name="COUNTY">
      <option value=""></option>
      <option value="台北市">台北市</option>
      <option value="基隆市">基隆市</option>
      <option value="新北市">新北市</option>
      <option value="新竹縣">新竹縣</option>
      <option value="新竹市">新竹市</option>
      <option value="桃園市">桃園市</option>
      <option value="苗栗縣">苗栗縣</option>
      <option value="台中市">台中市</option>
    </select>

    <label for="REALM">區鄉市鎮（模擬級聯載入）</label>
    <select id="REALM" name="REALM"><option value=""></option></select>

    <label for="MAILNO">郵遞區號</label>
    <select id="MAILNO" name="MAILNO">
      <option value=""></option>
      <option value="100">100</option>
      <option value="103">103</option>
      <option value="104">104</option>
      <option value="105">105</option>
      <option value="106">106</option>
      <option value="108">108</option>
      <option value="110">110</option>
      <option value="111">111</option>
      <option value="112">112</option>
      <option value="114">114</option>
      <option value="115">115</option>
      <option value="116">116</option>
    </select>

    <button type="submit">官方存檔（測試頁不應自動觸發）</button>
  </form>
  <div id="eventLog" aria-live="polite">尚未選取</div>

  <script>
    window.__KIDIT_HELPER_TEST__ = true;
    var form = document.querySelector('form');
    var submitCount = 0;
    form.addEventListener('submit', function (event) {
      event.preventDefault();
      submitCount += 1;
      document.getElementById('eventLog').textContent = 'submit=' + submitCount;
    });
    document.getElementById('COUNTY').addEventListener('change', function (event) {
      var realm = document.getElementById('REALM');
      realm.innerHTML = '<option value=""></option>' +
        '<option value="中正區">中正區</option><option value="大同區">大同區</option>' +
        '<option value="中山區">中山區</option><option value="松山區">松山區</option>' +
        '<option value="大安區">大安區</option><option value="萬華區">萬華區</option>' +
        '<option value="信義區">信義區</option>';
      var mailno = document.getElementById('MAILNO');
      mailno.innerHTML = '<option value=""></option><option value="100">100</option>' +
        '<option value="103">103</option><option value="104">104</option>' +
        '<option value="105">105</option><option value="106">106</option>' +
        '<option value="108">108</option><option value="110">110</option>' +
        '<option value="111">111</option><option value="112">112</option>' +
        '<option value="114">114</option><option value="115">115</option>' +
        '<option value="116">116</option>';
      document.getElementById('eventLog').textContent = 'COUNTY=' + event.target.value + '; change=1; submit=' + submitCount;
    });
    document.getElementById('MAILNO').addEventListener('change', function (event) {
      document.getElementById('eventLog').textContent = 'MAILNO=' + event.target.value + '; change=1; submit=' + submitCount;
    });
  </script>
</body>
</html>
